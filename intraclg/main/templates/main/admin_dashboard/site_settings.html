{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Settings | IntraClg Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f8f9fa;
    }

    .sidebar {
      height: 100vh;
      background-color: #0d6efd;
      color: white;
      padding: 20px;
    }

    .sidebar .profile-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .profile-section img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
    }

    .sidebar .profile-section h5 {
      margin-top: 10px;
      font-weight: 600;
    }

    .sidebar a {
      display: block;
      padding: 10px 15px;
      color: white;
      text-decoration: none;
      margin-bottom: 10px;
      border-radius: 6px;
      transition: 0.3s ease;
    }

    .sidebar a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .sidebar a.active {
      background-color: white;
      color: #0d6efd;
      font-weight: bold;
    }

    .main-content {
      padding: 40px;
    }

    .settings-box {
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .form-label {
      font-weight: 500;
    }

    .btn-save {
      background-color: #0d6efd;
      color: white;
      padding: 10px 25px;
      border-radius: 6px;
      font-weight: 500;
    }

    .btn-save:hover {
      background-color: #084298;
    }

    footer {
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand mb-0 h1">IntraClg - Admin</span>
  <a class="btn btn-sm btn-light" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
</nav>

<!-- Layout -->
<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 sidebar">
      <div class="profile-section">
        <img src="{% if profile.photo %}{{ profile.photo.url }}{% else %}{% static 'images/default_profile.jpg' %}{% endif %}" alt="Admin Profile" />
        <h5>{{ profile.full_name }}</h5>
        <small>Admin Panel</small>
      </div>
      <a href="{% url 'admin_dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
      <a href="{% url 'admin_profile' %}"><i class="bi bi-person-circle me-2"></i> Profile</a>
      <a href="{% url 'manage_users' %}"><i class="bi bi-people-fill me-2"></i> Users</a>
      <a href="{% url 'departments' %}" class="active"><i class="bi bi-building me-2"></i> Departments</a>
      <a href="{% url 'admin_reports' %}"><i class="bi bi-clipboard-data me-2"></i> Reports</a>
      <a href="{% url 'site_settings' %}"><i class="bi bi-gear me-2"></i> Site Settings</a>
      <a href="{% url 'universal_chat' %}"><i class="bi bi-chat-dots me-2"></i> Chat with Users</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 main-content">
      <h4 class="text-primary mb-4"><i class="bi bi-gear me-2"></i>Site Settings</h4>

      <div class="settings-box">
        <form>
          <div class="mb-3">
            <label for="siteName" class="form-label">College Name</label>
            <input type="text" class="form-control" id="siteName" placeholder="Pallavan College of Engineering">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Admin Contact Email</label>
            <input type="email" class="form-control" id="email" placeholder="admin@intraclg.edu">
          </div>

          <div class="mb-3">
            <label for="supportPhone" class="form-label">Support Phone</label>
            <input type="text" class="form-control" id="supportPhone" placeholder="+91 98765 43210">
          </div>

          <div class="mb-3">
            <label for="announcement" class="form-label">Homepage Announcement</label>
            <textarea class="form-control" id="announcement" rows="3">Welcome to the new academic year 2025!</textarea>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-save"><i class="bi bi-check-circle me-1"></i> Save Settings</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="text-center text-muted p-3 bg-light">
  &copy; 2025 IntraClg Admin Panel. All rights reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
