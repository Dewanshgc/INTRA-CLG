{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Admin Profile | IntraClg</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .sidebar {
      height: 100vh;
      background-color: #0d6efd;
      color: white;
      padding: 20px;
    }

    .sidebar .profile-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .profile-section img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
    }

    .sidebar .profile-section h5 {
      margin-top: 10px;
      font-weight: 600;
    }

    .sidebar a {
      display: block;
      padding: 10px 15px;
      color: white;
      text-decoration: none;
      margin-bottom: 10px;
      border-radius: 6px;
      transition: 0.3s ease;
    }

    .sidebar a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .sidebar a.active {
      background-color: white;
      color: #0d6efd;
      font-weight: bold;
    }

    .main-content {
      padding: 40px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .profile-preview {
      display: block;
      margin: 0 auto 20px;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn-submit {
      background-color: #0d6efd;
      color: white;
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: 500;
    }

    .btn-submit:hover {
      background-color: #0a58ca;
    }

    footer {
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand mb-0 h1">IntraClg - Admin</span>
  <a class="btn btn-sm btn-light" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
</nav>

<!-- Layout -->
<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 sidebar">
      <div class="profile-section">
        <img src="{% if profile.photo %}{{ profile.photo.url }}{% else %}{% static 'images/default_profile.jpg' %}{% endif %}" alt="Admin Profile">
        <h5>{{ profile.full_name }}</h5>
        <small>Admin Panel</small>
      </div>
      <a href="{% url 'admin_dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
      <a href="{% url 'admin_profile' %}"><i class="bi bi-person-circle me-2"></i> Profile</a>
      <a href="{% url 'manage_users' %}"><i class="bi bi-people-fill me-2"></i> Users</a>
      <a href="{% url 'departments' %}" class="active"><i class="bi bi-building me-2"></i> Departments</a>
      <a href="{% url 'admin_reports' %}"><i class="bi bi-clipboard-data me-2"></i> Reports</a>
      <a href="{% url 'site_settings' %}"><i class="bi bi-gear me-2"></i> Site Settings</a>
      <a href="{% url 'universal_chat' %}"><i class="bi bi-chat-dots me-2"></i> Chat with Users</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 main-content">
      <div class="form-box">
        <h4 class="text-primary mb-4 text-center">✏️ Update Profile</h4>
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="text-center">
            <img id="previewImage" src="{% if profile.photo %}{{ profile.photo.url }}{% else %}{% static 'images/default_profile.jpg' %}{% endif %}" class="profile-preview" alt="Profile Photo">
          </div>

          <div class="mb-3">
            <label class="form-label">Profile Photo</label>
            <input type="file" name="photo" class="form-control" accept="image/*" onchange="previewProfilePhoto(this)">
          </div>

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" value="{{ profile.full_name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ user.email }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="text" name="mobile" class="form-control" value="{{ profile.mobile }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea name="interests" class="form-control" rows="4">{{ profile.interests }}</textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-submit"><i class="bi bi-save me-1"></i> Save Changes</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="text-center text-muted p-3 bg-light">
  &copy; 2025 IntraClg Admin Panel. All rights reserved.
</footer>

<script>
  function previewProfilePhoto(input) {
    const file = input.files[0];
    const preview = document.getElementById('previewImage');
    if (file) {
      preview.src = URL.createObjectURL(file);
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
