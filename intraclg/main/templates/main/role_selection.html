{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Role | IntraClg</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/logo_nobg.png' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 600px;
      margin: 6rem auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .role-btn {
      margin: 10px;
      padding: 12px 25px;
      font-size: 1rem;
      border-radius: 50px;
      text-transform: capitalize;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Select Your Role</h2>
  <p class="mb-4">Please choose your role to proceed to your dashboard:</p>
  
  <a href="{% url 'set_user_role' 'student' %}" class="btn btn-primary role-btn">Student</a>
  <a href="{% url 'set_user_role' 'faculty' %}" class="btn btn-success role-btn">Faculty</a>
  <a href="{% url 'set_user_role' 'admin' %}" class="btn btn-danger role-btn">Admin</a>
  <a href="{% url 'set_user_role' 'alumni' %}" class="btn btn-warning role-btn">Alumni</a>
</div>

</body>
</html>
