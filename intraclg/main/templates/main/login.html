{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | IntraClg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{% static 'images/logo_nobg.png' %}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f3e8ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #fff;
      border-radius: 15px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
    }

    .login-box h2 {
      font-weight: 700;
      color: #0d6efd;
      text-align: center;
      margin-bottom: 30px;
    }

    form .mb-3 {
      display: flex;
      flex-direction: column;
    }

    form label {
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #333;
    }

    form input[type="text"],
    form input[type="password"] {
      border-radius: 30px;
      padding: 10px 18px;
      font-size: 0.95rem;
      height: 45px;
      border: 1px solid #ccc;
      transition: border-color 0.3s ease;
    }

    form input:focus {
      border-color: #0d6efd;
      box-shadow: none;
      outline: none;
    }

    .btn-login {
      border-radius: 30px;
      background: #0d6efd;
      color: #fff;
      padding: 12px;
      font-weight: 600;
      transition: background 0.3s ease;
      width: 100%;
      margin-top: 15px;
    }

    .btn-login:hover {
      background: #0b5ed7;
    }

    .text-danger {
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .signup-link {
      text-align: center;
      margin-top: 15px;
    }

    .signup-link a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login to IntraClg</h2>
  <form method="POST">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="text-danger mb-3">{{ form.non_field_errors.0 }}</div>
    {% endif %}

    <div class="mb-3">
      <label class="form-label">{{ form.username.label }}</label>
      {{ form.username }}
      {{ form.username.errors }}
    </div>

    <div class="mb-3">
      <label class="form-label">{{ form.password.label }}</label>
      {{ form.password }}
      {{ form.password.errors }}
    </div>

    <button type="submit" class="btn btn-login">Login</button>
  </form>

  <div class="signup-link">
    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
  </div>
</div>

</body>
</html>
