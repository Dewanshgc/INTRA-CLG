{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | IntraClg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{% static 'images/logo_nobg.png' %}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .signup-box {
      background: #fff;
      border-radius: 15px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
    }

    .signup-box h2 {
      font-weight: 700;
      color: #0d6efd;
      text-align: center;
      margin-bottom: 30px;
    }

    form .mb-3 {
      display: flex;
      flex-direction: column;
    }

    form label {
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #333;
    }

    form input[type="text"],
    form input[type="email"],
    form input[type="password"] {
      border-radius: 30px;
      padding: 10px 18px;
      font-size: 0.95rem;
      height: 45px;
      border: 1px solid #ccc;
      transition: border-color 0.3s ease;
    }

    form input:focus {
      border-color: #0d6efd;
      outline: none;
      box-shadow: none;
    }

    .btn-signup {
      border-radius: 30px;
      background: #0d6efd;
      color: #fff;
      padding: 12px;
      font-weight: 600;
      transition: background 0.3s ease;
      width: 100%;
      margin-top: 15px;
    }

    .btn-signup:hover {
      background: #0b5ed7;
    }

    .text-danger {
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .already {
      text-align: center;
      margin-top: 15px;
    }

    .already a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }

    .already a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="signup-box">
  <h2>Create Your Account</h2>
  <form method="POST" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
          <div class="text-danger">{{ field.errors|striptags }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-signup">Sign Up</button>
  </form>

  <div class="already">
    Already have an account? <a href="{% url 'login' %}">Log In</a>
  </div>
</div>

</body>
</html>
